name: "DAARION Edge Client — Sovereign Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Desktop ──────────────────────────────────────────────
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
            label: "macos-arm64"

          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
            label: "macos-x86_64"

          - platform: "ubuntu-22.04"
            args: ""
            rust_target: ""
            label: "linux-x86_64"

          - platform: "windows-latest"
            args: ""
            rust_target: ""
            label: "windows-x86_64"

          # ── Mobile ───────────────────────────────────────────────
          - platform: "ubuntu-22.04"
            args: "--target aarch64-linux-android"
            rust_target: "aarch64-linux-android"
            label: "android-arm64"

          # iOS requires macOS + Xcode (self-hosted) — skipping free-tier
          # - platform: "macos-latest"
          #   args: "--target aarch64-apple-ios"
          #   rust_target: "aarch64-apple-ios"
          #   label: "ios-arm64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{
              matrix.label == 'macos-arm64' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
              matrix.label == 'macos-x86_64' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
              matrix.label == 'android-arm64' && 'aarch64-linux-android' ||
              ''
            }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ── Linux system deps ──────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04' && matrix.label == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            pkg-config

      # ── Android setup ──────────────────────────────────────────
      - name: Setup Java (Android)
        if: matrix.label == 'android-arm64'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK
        if: matrix.label == 'android-arm64'
        uses: android-actions/setup-android@v3

      - name: Install Android target
        if: matrix.label == 'android-arm64'
        run: |
          rustup target add aarch64-linux-android
          cargo install tauri-cli --version "^2" 2>/dev/null || true
          # Install Android NDK tools
          sdkmanager "ndk;27.0.12077973" "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME

      - name: Init Tauri Android project
        if: matrix.label == 'android-arm64'
        run: |
          npm ci
          cargo tauri android init 2>/dev/null || true

      # ── Node.js setup ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      # ── Desktop Build (tauri-action) ────────────────────────────
      - name: Build Tauri Desktop App
        if: matrix.label != 'android-arm64'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DAARION Edge Client ${{ github.ref_name }}"
          releaseBody: |
            ## 🌌 DAARION Edge Client

            ### 📱 Downloads
            | Platform | File | Status |
            |----------|------|--------|
            | macOS (Apple Silicon) | `*.aarch64.dmg` | ✅ Built |
            | macOS (Intel) | `*.x86_64.dmg` | ✅ Built |
            | Windows | `*-setup.exe` / `*.msi` | ⚠️ Built — boot proof pending |
            | Linux | `*.AppImage` | ✅ Built |
            | Android | `*.apk` | ❌ Build only — signing not configured |

            ### ⚠️ Release Validation Status
            - `build exists` ≠ `install proof`
            - `install proof` ≠ `boot proof`
            - `boot proof` ≠ `worker proof`
            - Windows testers: check `%APPDATA%/DAARION Edge/logs/boot.log` if the app closes unexpectedly.
            - Android APK may not install on devices that require signed release builds.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      # ── Android Build ────────────────────────────────────────────
      - name: Build Tauri Android APK
        if: matrix.label == 'android-arm64'
        run: |
          cargo tauri android build --apk 2>&1
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Android APK to Release
        if: matrix.label == 'android-arm64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
