name: "DAARION Edge Client вЂ” Sovereign Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # в”Ђв”Ђ Desktop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
            label: "macos-arm64"

          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
            label: "macos-x86_64"

          - platform: "ubuntu-22.04"
            args: ""
            rust_target: ""
            label: "linux-x86_64"

          - platform: "windows-latest"
            args: ""
            rust_target: ""
            label: "windows-x86_64"

          # в”Ђв”Ђ Mobile в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          - platform: "ubuntu-22.04"
            args: "--target aarch64-linux-android"
            rust_target: "aarch64-linux-android"
            label: "android-arm64"

          # iOS requires macOS + Xcode (self-hosted) вЂ” skipping free-tier
          # - platform: "macos-latest"
          #   args: "--target aarch64-apple-ios"
          #   rust_target: "aarch64-apple-ios"
          #   label: "ios-arm64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{
              matrix.label == 'macos-arm64' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
              matrix.label == 'macos-x86_64' && 'aarch64-apple-darwin,x86_64-apple-darwin' ||
              matrix.label == 'android-arm64' && 'aarch64-linux-android' ||
              ''
            }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # в”Ђв”Ђ Linux system deps в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04' && matrix.label == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev \
            pkg-config

      # в”Ђв”Ђ Android setup в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Setup Java (Android)
        if: matrix.label == 'android-arm64'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK
        if: matrix.label == 'android-arm64'
        uses: android-actions/setup-android@v3

      - name: Install Android target
        if: matrix.label == 'android-arm64'
        run: |
          rustup target add aarch64-linux-android
          cargo install tauri-cli --version "^2" 2>/dev/null || true
          # Install Android NDK tools
          sdkmanager "ndk;27.0.12077973" "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME

      - name: Guard вЂ” Android signing secrets required
        if: matrix.label == 'android-arm64'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          HAS_KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          HAS_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          HAS_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$HAS_KEYSTORE" ] || \
             [ -z "$HAS_KS_PASS" ] || \
             [ -z "$HAS_KEY_ALIAS" ] || \
             [ -z "$HAS_KEY_PASS" ]; then
            echo "::error::Android signing secrets are required for release APK."
            echo "Required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi
          echo "вњ… All Android signing secrets are present."

      - name: Init Tauri Android project
        if: matrix.label == 'android-arm64'
        run: |
          npm ci
          cargo tauri android init 2>/dev/null || true

      - name: Configure Android release signing
        if: matrix.label == 'android-arm64'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Reconstruct keystore from base64 secret into a temp file
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/daarion-edge-release.keystore"
          echo "вњ… Keystore reconstructed at $RUNNER_TEMP/daarion-edge-release.keystore"

          # Write keystore.properties for Gradle signing config
          ANDROID_PROJECT_DIR="src-tauri/gen/android"
          {
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "password=$ANDROID_KEY_PASSWORD"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "storeFile=$RUNNER_TEMP/daarion-edge-release.keystore"
          } > "$ANDROID_PROJECT_DIR/keystore.properties"
          echo "вњ… keystore.properties written to $ANDROID_PROJECT_DIR/"

          # Patch build.gradle.kts to use release signing config
          GRADLE_FILE="$ANDROID_PROJECT_DIR/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            # Write signing config snippet to temp file
            cat > "$RUNNER_TEMP/signing-config.txt" << 'SIGNING_EOF'
              signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()
                      if (keystorePropertiesFile.exists()) {
                          keystoreProperties.load(keystorePropertiesFile.inputStream())
                          keyAlias = keystoreProperties["keyAlias"].toString()
                          keyPassword = keystoreProperties["password"].toString()
                          storeFile = file(keystoreProperties["storeFile"].toString())
                          storePassword = keystoreProperties["storePassword"].toString()
                      }
                  }
              }
          SIGNING_EOF

            # Use python to perform precise file manipulation
            python3 -c "
          import re
          with open('$GRADLE_FILE', 'r') as f:
              content = f.read()
          with open('$RUNNER_TEMP/signing-config.txt', 'r') as f:
              signing = f.read()
              
          # Insert signing configs before buildTypes if not already present
          if 'signingConfigs {' not in content:
              content = content.replace('buildTypes {', signing + '\n    buildTypes {', 1)
          
          # Update release buildType to use the signing config
          if 'signingConfig = signingConfigs.getByName(\"release\")' not in content:
              content = content.replace(
                  'getByName(\"release\") {',
                  'getByName(\"release\") {\n                signingConfig = signingConfigs.getByName(\"release\")',
                  1
              )
          with open('$GRADLE_FILE', 'w') as f:
              f.write(content)
          "

            echo "вњ… build.gradle.kts patched with release signing config"
            echo "--- Patched signing section ---"
            grep -A5 'signingConfigs' "$GRADLE_FILE" || true
          else
            echo "::warning::build.gradle.kts not found at $GRADLE_FILE вЂ” signing config not applied"
          fi

      # в”Ђв”Ђ Node.js setup в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install frontend dependencies
        run: npm ci

      # в”Ђв”Ђ Desktop Build (tauri-action) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build Tauri Desktop App
        if: matrix.label != 'android-arm64'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeRelease: true
          args: ${{ matrix.args }}

      # в”Ђв”Ђ Rename and Stage Desktop Artifacts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Rename and Stage Desktop Artifacts
        if: matrix.label != 'android-arm64'
        env:
          ARTIFACT_LABEL: ${{ matrix.label }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          node scripts/prepare-release-artifacts.cjs

      # в”Ђв”Ђ Upload Desktop Artifacts to Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload Desktop Artifacts to Release
        if: matrix.label != 'android-arm64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/artifacts/*
          prerelease: true
          body: |
            ## рџЊЊ DAARION Edge Client

            ### рџ“± Downloads
            | Platform | File | Status |
            |----------|------|--------|
            | Windows x64 (MSI) | `Daarion.Edge_<version>_x64_en-US.msi` | вљ пёЏ Beta вЂ” boot proof pending |
            | Windows x64 (Setup) | `Daarion.Edge_<version>_x64-setup.exe` | вљ пёЏ Beta вЂ” boot proof pending |
            | macOS (Apple Silicon) | `Daarion.Edge_<version>_aarch64.dmg` | вњ… Release-Signed |
            | macOS (Intel) | `Daarion.Edge_<version>_x64.dmg` | вњ… Release-Signed |
            | Linux | `Daarion.Edge_<version>_amd64.AppImage` | вњ… Beta |
            | Android | `Daarion.Edge_<version>_android_universal_release.apk` | вљ пёЏ Sideload APK beta |

            ### вљ пёЏ Release Validation Status
            - `build exists` в‰  `install proof`
            - `install proof` в‰  `boot proof`
            - `boot proof` в‰  `worker proof`
            - Windows testers: check `%APPDATA%/DAARION Edge/logs/boot.log` if the app closes unexpectedly.
            - Android APK is release-signed. Sideload installation requires enabling unknown sources.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # в”Ђв”Ђ Android Build (signed) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Build Tauri Android APK (signed)
        if: matrix.label == 'android-arm64'
        run: |
          cargo tauri android build --apk 2>&1
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      # в”Ђв”Ђ Rename and Stage Android Artifacts в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Rename and Stage Android Artifacts
        if: matrix.label == 'android-arm64'
        env:
          ARTIFACT_LABEL: ${{ matrix.label }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          node scripts/prepare-release-artifacts.cjs

      # в”Ђв”Ђ Upload signed Android APK to Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Upload signed Android APK to Release
        if: matrix.label == 'android-arm64'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/artifacts/*
          prerelease: true
          body: |
            ## рџЊЊ DAARION Edge Client

            ### рџ“± Downloads
            | Platform | File | Status |
            |----------|------|--------|
            | Windows x64 (MSI) | `Daarion.Edge_<version>_x64_en-US.msi` | вљ пёЏ Beta вЂ” boot proof pending |
            | Windows x64 (Setup) | `Daarion.Edge_<version>_x64-setup.exe` | вљ пёЏ Beta вЂ” boot proof pending |
            | macOS (Apple Silicon) | `Daarion.Edge_<version>_aarch64.dmg` | вњ… Release-Signed |
            | macOS (Intel) | `Daarion.Edge_<version>_x64.dmg` | вњ… Release-Signed |
            | Linux | `Daarion.Edge_<version>_amd64.AppImage` | вњ… Beta |
            | Android | `Daarion.Edge_<version>_android_universal_release.apk` | вљ пёЏ Sideload APK beta |

            ### вљ пёЏ Release Validation Status
            - `build exists` в‰  `install proof`
            - `install proof` в‰  `boot proof`
            - `boot proof` в‰  `worker proof`
            - Windows testers: check `%APPDATA%/DAARION Edge/logs/boot.log` if the app closes unexpectedly.
            - Android APK is release-signed. Sideload installation requires enabling unknown sources.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: matrix.label == 'android-arm64' && always()
        run: |
          rm -f "$RUNNER_TEMP/daarion-edge-release.keystore"
          rm -f src-tauri/gen/android/keystore.properties
          echo "вњ… Signing artifacts cleaned up"
